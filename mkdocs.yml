site_name: AgentWire Documentation
site_description: Real-time message bus and inspector for multi-agent LLM systems
site_author: AgentWire Contributors
site_url: https://agentwire.dev

repo_name: agentwire/agentwire
repo_url: https://github.com/agentwire/agentwire

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: quickstart.md
    - Installation: installation.md
    - Configuration: configuration.md
  - Core Concepts:
    - Overview: concepts/overview.md
    - Messages: concepts/messages.md
    - Sessions: concepts/sessions.md
    - Agents: concepts/agents.md
  - SDK Reference:
    - Overview: sdk/overview.md
    - configure(): sdk/configure.md
    - emit(): sdk/emit.md
    - wrap(): sdk/wrap.md
    - session(): sdk/session.md
  - Integrations:
    - LangChain: integrations/langchain.md
    - AutoGen: integrations/autogen.md
    - CrewAI: integrations/crewai.md
  - Dashboard:
    - Overview: dashboard/overview.md
    - Feed View: dashboard/feed.md
    - Graph View: dashboard/graph.md
    - Replay Mode: dashboard/replay.md
  - CLI:
    - Commands: cli/commands.md
    - Docker: cli/docker.md
  - Examples:
    - LangChain Research: examples/langchain.md
    - AutoGen Coding Team: examples/autogen.md
    - Raw API Pipeline: examples/raw-api.md
  - API Reference: api-reference.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
